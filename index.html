<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>موقعي الأول</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #0077cc;
            color: white;
            padding: 20px;
        }
        section {
            padding: 30px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>مرحباً بك في موقعي</h1>
    <p>هذا مثال على موقع إلكتروني بسيط</p>
</header>

<section>
    <p id="text">اضغط على الزر لتغيير النص</p>
    <button onclick="changeText()">اضغط هنا</button>
</section>

<script>
    function changeText() {
        document.getElementById("text").innerText = "تم تغيير النص بنجاح 🎉";
    }
</script>

</body>
</html>
